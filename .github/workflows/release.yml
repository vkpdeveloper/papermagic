name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_pattern: "*.AppImage"
          - runner: macos-15
            build_cmd: npm run build:mac
            artifact_pattern: "*.dmg"
          - runner: windows-latest
            build_cmd: npm run build:win
            artifact_pattern: "*.exe"

    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Verify Apple Silicon runner
        if: runner.os == 'macOS'
        run: |
          echo "Runner architecture: $(uname -m)"
          test "$(uname -m)" = "arm64"

      - name: Install Rollup arm64 binary
        if: runner.os == 'macOS'
        run: npm install --no-save @rollup/rollup-darwin-arm64

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.runner }}-artifact
          path: release
          retention-days: 5

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            **/*.AppImage
            **/*.dmg
            **/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
